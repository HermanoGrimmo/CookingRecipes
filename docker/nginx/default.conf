server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    # Symfony-Standard: alle Anfragen an index.php weiterleiten
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM über den Docker-internen Hostnamen ansprechen
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Sicherheit: nur index.php ist einstiegspunkt
        internal;
    }

    # Alle anderen .php-Dateien direkt blockieren
    location ~ \.php$ {
        return 404;
    }

    # Statische Assets: im Entwicklungsbetrieb keine aggressive Cachesteuerung
    location ~* \.(css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
