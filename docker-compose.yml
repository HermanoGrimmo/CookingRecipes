services:

  # PHP-FPM Anwendungsserver
  php:
    build:
      context: .
      target: development
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-cooking}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-cooking_recipes}?serverVersion=16&charset=utf8
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cooking

  # Nginx Webserver
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${HTTP_PORT:-8090}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - cooking

  # PostgreSQL Datenbank
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cooking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-cooking_recipes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cooking}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cooking

  # Mailpit – lokaler SMTP-Server zum Testen von E-Mails
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - cooking

volumes:
  postgres_data:

networks:
  cooking:
    driver: bridge
